<!DOCTYPE html>
<html>

<head>
    <title>Walk With God</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            background: #b7d9e5;
        }

        /* Master painting background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(165deg, 
                    #c4e0e9 0%,
                    #b7d9e5 20%,
                    #d4bfb0 60%,
                    #e3b79c 80%,
                    #e8b89d 100%),
                radial-gradient(ellipse at 20% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 45%, rgba(255, 235, 220, 0.35) 0%, transparent 45%),
                radial-gradient(ellipse at 40% 60%, rgba(255, 245, 235, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 25%, rgba(255, 250, 240, 0.25) 0%, transparent 35%),
                repeating-linear-gradient(45deg, 
                    rgba(255, 255, 255, 0.02) 0px,
                    rgba(255, 255, 255, 0.02) 5px,
                    transparent 5px,
                    transparent 10px),
                radial-gradient(ellipse at 50% 80%, rgba(255, 200, 150, 0.3) 0%, transparent 60%);
            filter: blur(2px);
            pointer-events: none;
            z-index: 0;
        }

        /* Artistic clouds */
        .painting-cloud {
            position: fixed;
            background: none;
            z-index: 1;
            pointer-events: none;
        }

        .cloud-1 {
            top: 15%;
            left: 0;
            width: 100%;
            height: 300px;
            background: 
                radial-gradient(ellipse at 10% 50%, rgba(255, 255, 255, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 40%, rgba(255, 240, 225, 0.3) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 55%, rgba(255, 250, 240, 0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 35%, rgba(255, 235, 220, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 45%, rgba(255, 245, 235, 0.35) 0%, transparent 45%);
            filter: blur(25px);
            animation: cloudDrift1 160s linear infinite;
        }

        .cloud-2 {
            top: 45%;
            right: 0;
            width: 100%;
            height: 350px;
            background: 
                radial-gradient(ellipse at 15% 50%, rgba(255, 240, 230, 0.3) 0%, transparent 45%),
                radial-gradient(ellipse at 35% 40%, rgba(255, 250, 240, 0.35) 0%, transparent 40%),
                radial-gradient(ellipse at 55% 60%, rgba(255, 235, 220, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 35%, rgba(255, 245, 235, 0.4) 0%, transparent 45%),
                radial-gradient(ellipse at 95% 55%, rgba(255, 240, 225, 0.3) 0%, transparent 40%);
            filter: blur(30px);
            animation: cloudDrift2 180s linear infinite;
        }

        .cloud-3 {
            bottom: 10%;
            left: 0;
            width: 100%;
            height: 250px;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255, 245, 235, 0.3) 0%, transparent 40%),
                radial-gradient(ellipse at 45% 40%, rgba(255, 250, 240, 0.4) 0%, transparent 45%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 240, 225, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 35%, rgba(255, 235, 220, 0.3) 0%, transparent 40%);
            filter: blur(20px);
            animation: cloudDrift3 200s linear infinite;
        }

        @keyframes cloudDrift1 {
            0% { transform: translateX(-10%) scale(1); opacity: 0.7; }
            50% { transform: translateX(5%) scale(1.05); opacity: 0.9; }
            100% { transform: translateX(-10%) scale(1); opacity: 0.7; }
        }

        @keyframes cloudDrift2 {
            0% { transform: translateX(10%) scale(1.05); opacity: 0.8; }
            50% { transform: translateX(-5%) scale(1); opacity: 0.6; }
            100% { transform: translateX(10%) scale(1.05); opacity: 0.8; }
        }

        @keyframes cloudDrift3 {
            0% { transform: translateX(-5%) scale(1); opacity: 0.6; }
            50% { transform: translateX(8%) scale(1.1); opacity: 0.8; }
            100% { transform: translateX(-5%) scale(1); opacity: 0.6; }
        }

        /* Sun effect */
        .sun-painting {
            position: fixed;
            top: 10%;
            right: 15%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, 
                rgba(255, 220, 170, 0.35) 0%,
                rgba(255, 200, 150, 0.25) 30%,
                rgba(255, 180, 130, 0.15) 50%,
                transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
            z-index: 1;
            animation: sunGlow 12s ease-in-out infinite;
        }

        @keyframes sunGlow {
            0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.6; }
            50% { transform: scale(1.2) translate(-10px, -5px); opacity: 0.9; }
        }

        /* Main app container */
        .app-container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 245, 235, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 80px 80px 50px 50px;
            padding: 45px;
            box-shadow: 
                0 40px 70px rgba(0, 0, 0, 0.1),
                0 20px 40px rgba(0, 0, 0, 0.05),
                inset 0 0 0 2px rgba(255, 255, 255, 0.6),
                inset 0 0 50px rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Artistic texture */
        .painting-texture {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.03) 0px, transparent 5px),
                repeating-radial-gradient(circle at 70% 60%, rgba(255, 240, 220, 0.03) 0px, transparent 7px);
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: overlay;
        }

        /* Title */
        h1 {
            text-align: center;
            color: #3f352c;
            font-size: 72px;
            margin-bottom: 25px;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-weight: 500;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 
                3px 3px 0 rgba(255, 255, 255, 0.7),
                6px 6px 0 rgba(210, 180, 140, 0.2),
                9px 9px 0 rgba(0, 0, 0, 0.05);
            position: relative;
            display: inline-block;
            width: 100%;
        }

        h1::before, h1::after {
            content: '✦';
            color: #d4a59a;
            font-size: 56px;
            margin: 0 30px;
            opacity: 0.9;
            display: inline-block;
            filter: drop-shadow(0 4px 8px rgba(255, 200, 150, 0.4));
            animation: paintSparkle 5s ease-in-out infinite;
        }

        h1::before { animation-delay: 0s; }
        h1::after { animation-delay: 2.5s; }

        @keyframes paintSparkle {
            0%, 100% { opacity: 0.7; transform: scale(1) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.3) rotate(8deg); }
        }

        /* Section headers */
        h2 {
            color: #3f352c;
            font-size: 42px;
            margin-bottom: 35px;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-weight: 400;
            border-bottom: 3px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 18px;
            letter-spacing: 4px;
            position: relative;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.5);
        }

        h2::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: -2px;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4a59a, transparent);
        }

        /* Home screen */
        #home {
            text-align: center;
            padding: 30px 0 50px;
        }

        #home h2 {
            font-size: 48px;
            border-bottom: none;
            margin-bottom: 20px;
        }

        #home h2::after {
            display: none;
        }

        #home p {
            color: #3f352c;
            font-size: 28px;
            margin: 45px 0 55px;
            font-style: italic;
            background: rgba(255, 245, 235, 0.5);
            backdrop-filter: blur(8px);
            padding: 35px 70px;
            display: inline-block;
            border-radius: 300px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.1),
                inset 0 0 0 2px rgba(255, 255, 255, 0.7),
                inset 0 0 40px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Buttons */
        button {
            padding: 22px 50px;
            margin: 15px;
            background: rgba(255, 245, 235, 0.6);
            backdrop-filter: blur(10px);
            color: #3f352c;
            border: none;
            border-radius: 120px;
            font-size: 24px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.5s ease;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.1),
                0 0 0 2px rgba(255, 255, 255, 0.7),
                inset 0 0 30px rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: rgba(255, 250, 240, 0.8);
            transform: translateY(-6px) scale(1.02);
            box-shadow: 
                0 25px 45px rgba(0, 0, 0, 0.15),
                0 0 0 3px rgba(255, 255, 255, 0.9),
                inset 0 0 40px rgba(255, 255, 255, 0.8);
            color: #2f251c;
        }

        button:active {
            transform: translateY(0) scale(1);
        }

        /* Home page buttons */
        #home button {
            width: 400px;
            display: block;
            margin: 25px auto;
            font-size: 28px;
            padding: 25px 45px;
            animation: paintFadeIn 0.8s ease backwards;
        }

        #home button:nth-child(3) { animation-delay: 0.1s; }
        #home button:nth-child(4) { animation-delay: 0.2s; }
        #home button:nth-child(5) { animation-delay: 0.3s; }

        @keyframes paintFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(2px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Input fields */
        input {
            padding: 22px 40px;
            width: 100%;
            max-width: 700px;
            margin: 15px 0 35px;
            border: none;
            border-radius: 120px;
            font-size: 24px;
            background: rgba(255, 245, 235, 0.7);
            backdrop-filter: blur(8px);
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            color: #3f352c;
            transition: all 0.5s;
            box-shadow: 
                inset 0 8px 20px rgba(0, 0, 0, 0.05),
                0 0 0 2px rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        input:focus {
            outline: none;
            box-shadow: 
                inset 0 8px 25px rgba(0, 0, 0, 0.08),
                0 0 0 4px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(255, 220, 180, 0.3);
            background: rgba(255, 250, 245, 0.9);
        }

        input::placeholder {
            color: #8f7e6e;
            font-style: italic;
            letter-spacing: 1.5px;
            opacity: 0.6;
        }

        /* Result containers */
        #answerResult, #bibleResult, #readerContent {
            margin-top: 40px;
            padding: 50px;
            background: rgba(255, 245, 235, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.1),
                inset 0 0 0 3px rgba(255, 255, 255, 0.8),
                inset 0 0 60px rgba(255, 255, 255, 0.4);
            text-align: left;
            font-size: 24px;
            line-height: 2;
            color: #3f352c;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        #answerResult::before, #bibleResult::before, #readerContent::before {
            content: '✦';
            position: absolute;
            top: -25px;
            left: 60px;
            color: #d4a59a;
            font-size: 52px;
            background: rgba(255, 245, 235, 0.8);
            backdrop-filter: blur(8px);
            padding: 8px 40px;
            border-radius: 80px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.7);
        }

        /* Chapter navigation */
        .chapter-navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 40px 0 30px;
            padding: 30px 50px;
            background: rgba(255, 245, 235, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 120px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1);
        }

        .chapter-navigation button {
            padding: 22px 50px;
            font-size: 24px;
            margin: 0;
            min-width: 180px;
            background: rgba(255, 255, 255, 0.7);
        }

        .chapter-navigation button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .chapter-navigation span {
            font-size: 36px;
            color: #3f352c;
            font-weight: 500;
            letter-spacing: 4px;
            font-family: 'Cormorant Garamond', serif;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 18px 55px;
            border-radius: 100px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 4px 20px rgba(255, 220, 180, 0.2);
            text-shadow: 2px 2px 0 white;
        }

        /* Book and Chapter grids */
        .book-grid, .chapter-grid {
            display: grid;
            gap: 20px;
            padding: 35px;
            background: rgba(255, 245, 235, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.7);
            margin: 30px 0;
            max-height: 600px;
            overflow-y: auto;
        }

        .book-grid {
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        }

        .chapter-grid {
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        }

        .book-grid button, .chapter-grid button {
            padding: 22px 15px;
            font-size: 24px;
            text-transform: none;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.7);
            margin: 0;
        }

        .book-grid button:hover, .chapter-grid button:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-8px) scale(1.02);
        }

        /* Verse text */
        #chapter-text {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            line-height: 2.4;
            color: #3f352c;
            padding: 45px;
            background: rgba(255, 245, 235, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.7);
            margin-top: 30px;
            max-height: 600px;
            overflow-y: auto;
            font-size: 26px;
        }

        #chapter-text p {
            margin-bottom: 22px;
            padding: 20px 35px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            border-left: 10px solid rgba(212, 175, 55, 0.4);
            transition: all 0.5s;
        }

        #chapter-text p:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateX(10px);
            border-left-color: #d4a59a;
        }

        #chapter-text strong {
            color: #4a3b2f;
            font-size: 28px;
            margin-right: 25px;
            background: rgba(212, 175, 55, 0.15);
            padding: 6px 20px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Navigation buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0;
        }

        .nav-buttons button {
            padding: 20px 45px;
            min-width: 220px;
            font-size: 24px;
        }

        /* Section animations */
        #askSection, #bibleSection, #readerSection {
            animation: paintReveal 1s ease;
            position: relative;
        }

        @keyframes paintReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.97); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 16px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 245, 235, 0.5);
            border-radius: 30px;
            border: 3px solid rgba(255, 255, 255, 0.7);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(145deg, #d4a59a, #c49488);
            border-radius: 30px;
            border: 4px solid rgba(255, 255, 255, 0.7);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(145deg, #c49488, #b58478);
        }

        /* Painting glow effects */
        .painting-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 220, 180, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(200, 220, 240, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 3;
            mix-blend-mode: soft-light;
        }

        /* Warm horizon */
        .warm-horizon {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(232, 184, 157, 0.25), transparent);
            pointer-events: none;
            z-index: 3;
        }

        /* Loading indicator */
        .loading {
            text-align: center;
            padding: 70px;
            color: #7f6e5e;
            font-size: 32px;
            font-style: italic;
            position: relative;
        }

        .loading::after {
            content: '✦';
            animation: paintSpin 4s linear infinite;
            display: inline-block;
            margin-left: 20px;
            font-size: 40px;
            color: #d4a59a;
        }

        @keyframes paintSpin {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .app-container { padding: 30px 20px; }
            h1 { font-size: 48px; }
            h1::before, h1::after { font-size: 32px; margin: 0 10px; }
            h2 { font-size: 32px; }
            #home p { font-size: 22px; padding: 25px 35px; }
            button { padding: 18px 35px; font-size: 20px; }
            #home button { width: 300px; font-size: 22px; }
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .chapter-navigation { flex-wrap: wrap; }
            .chapter-navigation button { min-width: 140px; font-size: 20px; }
            .chapter-navigation span { font-size: 26px; padding: 15px 30px; }
            #chapter-text { font-size: 22px; }
        }
    </style>
</head>

<body>
    <!-- Painting background elements -->
    <div class="painting-cloud cloud-1"></div>
    <div class="painting-cloud cloud-2"></div>
    <div class="painting-cloud cloud-3"></div>
    <div class="sun-painting"></div>
    <div class="painting-texture"></div>
    <div class="painting-glow"></div>
    <div class="warm-horizon"></div>

    <div class="app-container">
        <h1>Walk With God</h1>

        <!-- Home Screen -->
        <div id="home">
            <h2>Welcome</h2>
            <p>"Your word is a lamp to my feet and a light to my path." — Psalm 119:105</p>
            <button onclick="showAsk()">❓ Ask a Question</button>
            <button onclick="showBible()">🔍 Search the Bible</button>
            <button onclick="showReader()">📖 Read the Bible</button>
        </div>

        <!-- Ask Question Screen -->
        <div id="askSection" style="display:none">
            <h2>Ask a Question</h2>
            <input id="question" placeholder="Ask something like 'why do I feel jealous?'">
            <button onclick="answerQuestion()">Ask</button>
            <div id="answerResult"></div>
            <button onclick="goHome()">← Back</button>
        </div>

        <!-- Search Bible Screen -->
        <div id="bibleSection" style="display:none">
            <h2>Search the Bible</h2>
            <input id="bibleSearch" placeholder="Search a word like 'love'">
            <button onclick="searchBible()">Search</button>
            <div id="bibleResult"></div>
            <button onclick="goHome()">← Back</button>
        </div>

        <!-- Read Bible Screen -->
        <div id="readerSection" style="display:none">
            <h2>Read the Bible</h2>
            <div id="readerContent">
                <p>Loading books...</p>
            </div>
            <button onclick="goHome()" style="margin-top:20px;">← Back</button>
        </div>
    </div>

    <script>
        function showAsk() {
            document.getElementById("home").style.display = "none";
            document.getElementById("askSection").style.display = "block";
            document.getElementById("bibleSection").style.display = "none";
            document.getElementById("readerSection").style.display = "none";
        }

        function showBible() {
            document.getElementById("home").style.display = "none";
            document.getElementById("askSection").style.display = "none";
            document.getElementById("bibleSection").style.display = "block";
            document.getElementById("readerSection").style.display = "none";
        }

        function showReader() {
            document.getElementById("home").style.display = "none";
            document.getElementById("askSection").style.display = "none";
            document.getElementById("bibleSection").style.display = "none";
            document.getElementById("readerSection").style.display = "block";
            loadBooks();
        }

        function goHome() {
            document.getElementById("home").style.display = "block";
            document.getElementById("askSection").style.display = "none";
            document.getElementById("bibleSection").style.display = "none";
            document.getElementById("readerSection").style.display = "none";
        }

        const topics = [
            {
                keywords: ["lust", "temptation", "desire"],
                verse: "Matthew 5:28",
                text: "But I tell you that anyone who looks at a woman lustfully has already committed adultery with her in his heart.",
                explanation: "Jesus teaches that sin begins in the heart and mind, not just in actions. Lust treats people as objects rather than honoring them as God's creation.",
                guidance: "Guard your thoughts and what you watch. Focus on respecting others and building healthy relationships based on love, not lust."
            },
            {
                keywords: ["anger", "mad", "frustrated"],
