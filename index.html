<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Exercise Enforcer - Tabs</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* main app container */
        .app-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(2px);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(135deg, #FFD166, #FF9F4A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            color: #b9d8f0;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        /* top bar with date and reset */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0b1219aa;
            padding: 10px 16px;
            border-radius: 50px;
            margin-bottom: 20px;
            backdrop-filter: blur(4px);
        }

        .date-badge {
            background: #2c3e44;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #f0f3f8;
        }

        .reset-btn {
            background: #2c3e50;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            color: #ffb347;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* add exercise form */
        .add-exercise {
            background: #101c26cc;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .input-group {
            flex: 2;
            min-width: 140px;
        }

        .input-group label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #9bc2e6;
            display: block;
            margin-bottom: 4px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            background: #1f2e38;
            border: 1px solid #3c627a;
            padding: 8px 12px;
            border-radius: 24px;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .add-btn {
            background: #FF9F4A;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            align-self: flex-end;
        }

        /* ----- TABS (mobile friendly) ----- */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: #0a1118;
            padding: 6px;
            border-radius: 50px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 8px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #9aaebf;
            background: transparent;
        }

        .tab.active {
            background: #FF9F4A;
            color: #1a2a2f;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* exercise list container */
        .exercises-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* exercise card */
        .exercise-card {
            background: #0f1820e6;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 6px solid #ff9f4a;
            transition: all 0.2s;
        }

        .exercise-card.completed {
            opacity: 0.75;
            border-left-color: #2ecc71;
            background: #0b1a1fd9;
        }

        .check-box {
            width: 36px;
            height: 36px;
            background: #1f3a44;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
            transition: 0.1s;
        }

        .check-box.checked {
            background: #2ecc71;
            box-shadow: 0 0 6px #2ecc71;
        }

        .exercise-info {
            flex: 3;
        }

        .exercise-name {
            font-weight: bold;
            font-size: 1rem;
            word-break: break-word;
        }

        .punishment-preview {
            font-size: 0.7rem;
            color: #ffae70;
            margin-top: 4px;
        }

        .delete-exercise {
            background: #3a2c2c;
            border: none;
            color: #ff8a7a;
            font-size: 1.1rem;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* empty state */
        .empty-state {
            text-align: center;
            color: #8aaec0;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        /* consequence area */
        .consequence-area {
            background: #00000066;
            border-radius: 28px;
            padding: 16px;
            border-top: 2px solid #ff7b2c;
        }

        .consequence-title {
            font-weight: bold;
            font-size: 0.85rem;
            color: #ffaa66;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #punishmentMessage {
            background: #1f1a15;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #ffc285;
            word-break: break-word;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .action-buttons button {
            background: #2c2b2b;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            color: #ddd;
        }

        .footer-note {
            font-size: 0.6rem;
            text-align: center;
            margin-top: 16px;
            color: #8aaec0;
        }

        @media (max-width: 500px) {
            .app-container {
                padding: 14px;
            }
            .exercise-card {
                padding: 10px 12px;
            }
            .check-box {
                width: 32px;
                height: 32px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>💪 EXERCISE ENFORCER</h1>
        <div class="sub">✅ TABS: Completed vs Incomplete • ⚡ Consequences</div>
    </div>

    <div class="top-bar">
        <div class="date-badge" id="currentDate"></div>
        <button class="reset-btn" id="resetDayBtn">⟳ Reset Today</button>
    </div>

    <!-- add new exercise -->
    <div class="add-exercise">
        <div class="input-group">
            <label>🏋️ EXERCISE</label>
            <input type="text" id="exerciseName" placeholder="e.g., 20 push-ups" autocomplete="off">
        </div>
        <div class="input-group">
            <label>⚠️ PUNISHMENT</label>
            <textarea id="punishmentText" rows="1" placeholder="e.g., No dessert, 50 burpees"></textarea>
        </div>
        <button class="add-btn" id="addExerciseBtn">➕ ADD</button>
    </div>

    <!-- TABS (complete / incomplete) -->
    <div class="tabs">
        <div class="tab" data-tab="incomplete">❌ Incomplete</div>
        <div class="tab" data-tab="complete">✅ Complete</div>
    </div>

    <!-- dynamic exercise list -->
    <div id="exercisesContainer" class="exercises-list">
        <div class="empty-state">✨ Add your first exercise ✨</div>
    </div>

    <!-- punishment zone -->
    <div class="consequence-area">
        <div class="consequence-title">🔥 ACTIVE CONSEQUENCE 🔥</div>
        <div id="punishmentMessage">😇 No punishment! Complete all tasks.</div>
        <div class="action-buttons">
            <button id="forcePunishBtn">💀 Force punishment</button>
            <button id="clearPunishBtn">✨ Clear manually</button>
        </div>
    </div>
    <div class="footer-note">📱 Tap checkbox to complete • Swipe list • New day auto-resets checks</div>
</div>

<script>
    // Data model
    let exercises = [];           // each: { id, name, punishment, completed }
    let currentTab = "incomplete";  // 'incomplete' or 'complete'
    let currentDate = new Date().toLocaleDateString('en-CA');
    let punishmentActive = false;

    // DOM elements
    const exercisesContainer = document.getElementById('exercisesContainer');
    const dateDisplay = document.getElementById('currentDate');
    const resetBtn = document.getElementById('resetDayBtn');
    const addBtn = document.getElementById('addExerciseBtn');
    const exerciseNameInput = document.getElementById('exerciseName');
    const punishmentTextarea = document.getElementById('punishmentText');
    const punishmentMessageDiv = document.getElementById('punishmentMessage');
    const forcePunishBtn = document.getElementById('forcePunishBtn');
    const clearPunishBtn = document.getElementById('clearPunishBtn');
    const tabs = document.querySelectorAll('.tab');

    // Storage keys
    const STORAGE_EXERCISES = "custom_exercises_list";
    const STORAGE_DATE = "last_saved_date";
    const STORAGE_PUNISHMENT_ACTIVE = "punishment_active_status";

    // Helper: escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Format date display
    function formatDateReadable(dateStr) {
        const parts = dateStr.split('-');
        if(parts.length !== 3) return dateStr;
        const dateObj = new Date(dateStr);
        return dateObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    // Update punishment flag based on exercises
    function updatePunishmentFromExercises() {
        if (!exercises.length) {
            punishmentActive = false;
        } else {
            const allCompleted = exercises.every(ex => ex.completed === true);
            punishmentActive = !allCompleted;
        }
        savePunishmentFlag();
        renderPunishmentMessage();
    }

    function renderPunishmentMessage() {
        if (!exercises.length) {
            punishmentMessageDiv.innerHTML = "📭 No exercises yet. Add tasks to see consequences.";
            return;
        }

        if (punishmentActive) {
            const incomplete = exercises.filter(ex => !ex.completed);
            if (incomplete.length === 0) {
                punishmentMessageDiv.innerHTML = "✅ ALL DONE! No punishment today. 🎉";
            } else {
                let html = `<strong>⚠️ MISSED ${incomplete.length} TASK(S):</strong><br>`;
                incomplete.forEach(ex => {
                    const punish = ex.punishment?.trim() || "Default punishment";
                    html += `‣ ${escapeHtml(ex.name)} → ${escapeHtml(punish)}<br>`;
                });
                html += `<br><span style="color:#ff9f4a;">🔥 Do them or face the consequence!</span>`;
                punishmentMessageDiv.innerHTML = html;
            }
        } else {
            punishmentMessageDiv.innerHTML = "✨ PERFECT! All exercises completed. No punishment. ✨";
        }
    }

    // Render exercises based on active tab
    function renderExercises() {
        if (!exercisesContainer) return;

        let filteredExercises;
        if (currentTab === "complete") {
            filteredExercises = exercises.filter(ex => ex.completed === true);
        } else {
            filteredExercises = exercises.filter(ex => ex.completed === false);
        }

        if (filteredExercises.length === 0) {
            let message = currentTab === "complete" ? "🎉 No completed exercises yet. Keep going!" : "🏋️ No incomplete tasks. Great job!";
            exercisesContainer.innerHTML = `<div class="empty-state">${message}</div>`;
            return;
        }

        let html = '';
        filteredExercises.forEach(ex => {
            const checkedClass = ex.completed ? 'checked' : '';
            const completedCardClass = ex.completed ? 'completed' : '';
            const checkIcon = ex.completed ? '✓' : '○';
            const punishmentDisplay = ex.punishment?.trim() || "No punishment set";
            
            html += `
                <div class="exercise-card ${completedCardClass}" data-id="${ex.id}">
                    <div class="check-box ${checkedClass}" data-id="${ex.id}" data-toggle>
                        ${checkIcon}
                    </div>
                    <div class="exercise-info">
                        <div class="exercise-name">${escapeHtml(ex.name)}</div>
                        <div class="punishment-preview">⚡ ${escapeHtml(punishmentDisplay)}</div>
                    </div>
                    <button class="delete-exercise" data-id="${ex.id}" data-delete>🗑️</button>
                </div>
            `;
        });
        exercisesContainer.innerHTML = html;
        renderPunishmentMessage();
    }

    // Toggle completion
    function toggleExerciseCompletion(exerciseId) {
        const exercise = exercises.find(ex => ex.id == exerciseId);
        if (exercise) {
            exercise.completed = !exercise.completed;
            saveExercisesToLocal();
            updatePunishmentFromExercises();
            renderExercises();  // re-render current tab
        }
    }

    // Delete exercise
    function deleteExercise(exerciseId) {
        exercises = exercises.filter(ex => ex.id != exerciseId);
        saveExercisesToLocal();
        updatePunishmentFromExercises();
        renderExercises();
    }

    // Add new exercise
    function addNewExercise() {
        const name = exerciseNameInput.value.trim();
        let punishment = punishmentTextarea.value.trim();

        if (name === "") {
            alert("Please enter an exercise name!");
            return;
        }
        if (punishment === "") {
            punishment = "10 extra burpees";
        }

        const newId = Date.now() + Math.floor(Math.random() * 10000);
        exercises.push({
            id: newId,
            name: name,
            punishment: punishment,
            completed: false,
        });

        exerciseNameInput.value = "";
        punishmentTextarea.value = "";
        
        saveExercisesToLocal();
        updatePunishmentFromExercises();
        // after adding, switch to incomplete tab to see new task
        if (currentTab !== "incomplete") {
            currentTab = "incomplete";
            updateTabUI();
        }
        renderExercises();
    }

    // Reset all completions for today
    function resetTodaysChecks() {
        if (exercises.length === 0) return;
        exercises.forEach(ex => { ex.completed = false; });
        saveExercisesToLocal();
        updatePunishmentFromExercises();
        renderExercises();
    }

    // Manual punishment override
    function forcePunishment() {
        if (exercises.length === 0) {
            alert("Add exercises first.");
            return;
        }
        punishmentActive = true;
        savePunishmentFlag();
        renderPunishmentMessage();
    }

    function clearPunishmentManually() {
        punishmentActive = false;
        savePunishmentFlag();
        renderPunishmentMessage();
    }

    // Tab handling
    function setActiveTab(tabId) {
        currentTab = tabId;
        updateTabUI();
        renderExercises();
    }

    function updateTabUI() {
        tabs.forEach(tab => {
            const tabValue = tab.getAttribute('data-tab');
            if (tabValue === currentTab) {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });
    }

    // LocalStorage save/load with date reset logic
    function saveExercisesToLocal() {
        localStorage.setItem(STORAGE_EXERCISES, JSON.stringify(exercises));
        localStorage.setItem(STORAGE_DATE, currentDate);
    }

    function savePunishmentFlag() {
        localStorage.setItem(STORAGE_PUNISHMENT_ACTIVE, JSON.stringify(punishmentActive));
    }

    function loadData() {
        const savedDate = localStorage.getItem(STORAGE_DATE);
        const todayStr = new Date().toLocaleDateString('en-CA');
        
        if (savedDate !== todayStr) {
            // New day: keep exercises but reset completions
            const savedExercisesRaw = localStorage.getItem(STORAGE_EXERCISES);
            if (savedExercisesRaw) {
                try {
                    const parsed = JSON.parse(savedExercisesRaw);
                    if (Array.isArray(parsed)) {
                        exercises = parsed.map(ex => ({
                            id: ex.id,
                            name: ex.name,
                            punishment: ex.punishment,
                            completed: false
                        }));
                    } else {
                        exercises = [];
                    }
                } catch(e) { exercises = []; }
            } else {
                exercises = [];
            }
            punishmentActive = false;
            currentDate = todayStr;
            saveExercisesToLocal();
        } else {
            // Same day: load everything normally
            const storedExercises = localStorage.getItem(STORAGE_EXERCISES);
            if (storedExercises) {
                try {
                    exercises = JSON.parse(storedExercises);
                    if (!Array.isArray(exercises)) exercises = [];
                } catch(e) { exercises = []; }
            } else {
                exercises = [];
            }
            const storedPunishmentFlag = localStorage.getItem(STORAGE_PUNISHMENT_ACTIVE);
            if (storedPunishmentFlag !== null) {
                punishmentActive = JSON.parse(storedPunishmentFlag);
            } else {
                const allComplete = exercises.length ? exercises.every(e => e.completed) : true;
                punishmentActive = exercises.length ? !allComplete : false;
            }
        }
        
        // Final consistency check
        if (exercises.length > 0) {
            const trulyAllComplete = exercises.every(e => e.completed === true);
            if (trulyAllComplete && punishmentActive === true) punishmentActive = false;
            if (!trulyAllComplete && punishmentActive === false && exercises.length > 0) punishmentActive = true;
        } else {
            punishmentActive = false;
        }
        
        savePunishmentFlag();
        updateDateDisplay();
        updateTabUI();
        renderExercises();
    }

    function updateDateDisplay() {
        dateDisplay.innerText = `📅 ${formatDateReadable(currentDate)}`;
    }

    // Event delegation for check & delete
    exercisesContainer.addEventListener('click', (e) => {
        const toggleBtn = e.target.closest('[data-toggle]');
        if (toggleBtn) {
            const id = toggleBtn.getAttribute('data-id');
            if (id) toggleExerciseCompletion(id);
            return;
        }
        const deleteBtn = e.target.closest('[data-delete]');
        if (deleteBtn) {
            const id = deleteBtn.getAttribute('data-id');
            if (id) deleteExercise(id);
            return;
        }
    });

    // Tab listeners
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const tabValue = tab.getAttribute('data-tab');
            setActiveTab(tabValue);
        });
    });

    // Buttons
    addBtn.addEventListener('click', addNewExercise);
    resetBtn.addEventListener('click', resetTodaysChecks);
    forcePunishBtn.addEventListener('click', forcePunishment);
    clearPunishBtn.addEventListener('click', clearPunishmentManually);
    
    // Enter key shortcuts
    exerciseNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addNewExercise();
    });
    punishmentTextarea.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            addNewExercise();
        }
    });

    // Initialize
    loadData();
</script>
</body>
</html>
